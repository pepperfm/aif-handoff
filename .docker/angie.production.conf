resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

acme_client letsencrypt https://acme-v02.api.letsencrypt.org/directory
    key_type=ecdsa
    challenge=http;

server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        # Handled automatically by ACME module
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate $acme_cert_letsencrypt;
    ssl_certificate_key $acme_cert_key_letsencrypt;
    acme letsencrypt;

    location / {
        root /usr/share/angie/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /ws {
        proxy_pass http://api:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://api:3009/;
    }
}
